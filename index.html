<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Опрос</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}

.step { display: none; padding: 40px; }
.step.active { display: block; }

button {
  padding: 15px 25px;
  margin: 10px;
  font-size: 18px;
  cursor: pointer;
}

#yesBtn { position: relative; }
</style>
</head>

<body>

<h1>Опрос</h1>

<form action="https://formsubmit.co/1b4df30115f9df19a7206a20a4ef801b" method="POST">

<!-- FormSubmit настройки -->
<input type="hidden" name="_subject" value="Новый результат опроса">
<input type="hidden" name="_captcha" value="false">

<!-- убираем 404 редирект -->
<input type="hidden" name="_next" value="https://spam98559-svg.github.io/server/">

<!-- сюда уйдёт текст -->
<input type="hidden" name="data" id="data">

<!-- STEP 1 -->
<div id="s1" class="step active">
  <h2>Вопрос 1</h2>
  <button type="button" onclick="next('Вопрос 1','Да')">Да</button>
  <button type="button" onclick="next('Вопрос 1','Нет')">Нет</button>
</div>

<!-- STEP 2 -->
<div id="s2" class="step">
  <h2>Вопрос 2</h2>
  <button type="button" onclick="next('Вопрос 2','Да')">Да</button>
  <button type="button" onclick="next('Вопрос 2','Нет')">Нет</button>
</div>

<!-- STEP 3 -->
<div id="s3" class="step">
  <h2>Вопрос 3</h2>
  <button type="button" onclick="next('Вопрос 3','Да')">Да</button>
  <button type="button" onclick="next('Вопрос 3','Нет')">Нет</button>
</div>

<!-- STEP 4 -->
<div id="s4" class="step">
  <h2>Продолжить?</h2>
  <button type="button" onclick="runAway()" id="yesBtn">Да</button>
</div>

<!-- ФИНИШ -->
<div id="end" class="step">
  <h2>Готово 👍</h2>
  <button type="submit">Завершить</button>
</div>

</form>

<script>
let answers = {};
let yesCount = 0;
let current = "s1";

function show(id){
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function next(key,val){
  answers[key] = val;

  if(current==="s1"){ show('s2'); current="s2"; }
  else if(current==="s2"){ show('s3'); current="s3"; }
  else if(current==="s3"){ show('s4'); current="s4"; }
  else if(current==="s4"){ show('end'); current="end"; }
}

function runAway(){
  let btn = document.getElementById('yesBtn');

  if(yesCount < 4){
    yesCount++;
    btn.style.left = Math.random()*200 + "px";
    btn.style.top = Math.random()*200 + "px";
  } else {
    answers["Продолжение"] = "Нет";
    show('end');
  }
}

document.querySelector("form").addEventListener("submit", function(){
  let text = "";

  for(let key in answers){
    text += key + ": " + answers[key] + "\n";
  }

  document.getElementById("data").value = text;
});
</script>

</body>
</html>
